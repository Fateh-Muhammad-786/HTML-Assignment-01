<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>

<body style="width: 100%; height: 100%; padding-left: 500px; margin: 0; padding: 0;">

    <div style="background-color:MistyRose; width: 700px;" id="top">

        <form action="index.html">

            <span style="padding-left: 275px;"><input type="button" value="Top to Bottom"
                    onclick="window.location.href=`#bottom`;"></span>
            <br><br>

            <h1 style="color: red; text-align: center;">Student Registration Form</h1>
            <br>

            <!-- Input Type Text -->

            <label for="username"><span style="color: blue; padding-left: 80px;">Student name :</span></label>
            <input type="text" size="20" placeholder="First Name" id="username" name="username">
            - <input type="text" size="20" placeholder="Last Name" id="username" name="username">
            <br><br>


            <label for="fname"><span style="color: blue; padding-left: 80px;">Father's name :</span></label>
            <span style="padding-left: px;"><input type="text" size="20" id="fname" name="fname"></span>
            <br><br>

            <label for="address"><span style="color: blue; padding-left: 80px;">Address : </span></label>
            <span style="padding-left: 35px;"><input type="text" size="20" id="address" name="address"></span>
            <br><br>

            <!-- Input Type Number -->

            <label for="rollnumber"><span style="color: blue; padding-left: 80px;">Roll no : </span></label>
            <span style="padding-left: 38px;"><input type="number" size="50" id="rollnumber" name="rollnumber"></span>
            <br><br>

            <label for="mobileno"><span style="color: blue; padding-left: 80px;">Mobile no :</span></label>
            <span style="padding-left: 20px;">
                <input type="number" placeholder="+92" size="2" id="mobileno" name="mobileno"></span>
            <br><br>
            <label>

                <!-- Input Type Date -->

                <label for="date"><span style="color: blue; padding-left: 80px;">Date of birth : </span></label>
                <span style="padding-left: 5px;"><input type="date" size="3" id="date" name="date"></span>
                <br><br>

                <!-- Input Type Email -->

                <label for="email"><span style="color: blue; padding-left: 80px;">Email id : </span></label>
                <span style="padding-left: 30px;"><input type="email" size="48" id="email" name="email"></span>
                <br><br>

                <!-- Input Type Password -->

                <label for="Password">
                    <span style="color: blue; padding-left: 80px;">Password :</span></label>
                <span style="padding-left: 25px;"><input type="password" size="20" id="Password" name="Password"></span>
                <br><br>

                <!-- Input Type Radio -->

                <label for="radio">
                    <span style="color: blue; padding-left: 80px;">Gender : </span></label>
                <span style="padding-left: 35px;"><input type="radio" name="radio" id="radio">Male <input type="radio"
                        name="Gender">Female </span>
                <br><br>

                <!-- Input Type Checkbox -->

                <label for="chechbox"><span style="color: blue; padding-left: 80px;">Department : </span></label>
                <span style="padding-left: 10px;">
                    <input type="checkbox"> CSE
                    <input type="checkbox" id="chechbox" name="chechbox"> IT
                    <input type="checkbox">ECE
                    <input type="checkbox"> Civil
                    <input type="checkbox"> Mech </span>
                <br><br>


                <label>
                    <span style="color: blue; padding-left: 80px;">Course : </span>
                    <select>

                        <span style="padding-left: 40px;">
                            <option> ---------- Select Your Course's ----------- </option>
                        </span>
                        <option>Python</option>
                        <option>Node js</option>
                        <option>JavaScript</option>
                        <option>React js</option>
                        <option>PHP</option>
                        <option>HTML</option>
                        <option>CSS</option>
                        <option>Express js</option>
                    </select>
                </label>
                <br><br>

                <!-- Input Type File -->

                <label for="sphoto"><span style="color: blue; padding-left: 80px;">Student Photo : </span></label>
                <input type="file" id="sphoto" name="sphoto">
                <br><br>

                <label>
                    <span style="color: blue; padding-left: 80px;">City : </span>
                    <select>
                        <option> ----------- Select Your City -----------</option>
                        <option>Karachi</option>
                        <option>Lahore</option>
                        <option>Faisalabad</option>
                        <option>Rawalpindi</option>
                        <option>Gujranwala</option>
                        <option>Multan</option>
                        <option>Hyderabad</option>
                        <option>Peshawar</option>
                        <option>Quetta</option>
                        <option>Islamabad</option>
                        <option>Sargodha</option>
                        <option>Sialkot</option>
                        <option>Bahawalpur</option>
                        <option>Jhang</option>
                        <option>Sheikhupura</option>
                        <option>Gujrat</option>
                        <option>Sukkur</option>
                        <option>Larkana</option>
                        <option>Sahiwal</option>
                        <option>Okara</option>
                        <option>Rahim Yar Khan</option>
                        <option>Kasur</option>
                        <option>Dera Ghazi Khan</option>
                        <option>Wah Cantonment</option>
                        <option>Mardan</option>
                        <option>Nawabshah</option>
                        <option>Burewala</option>
                        <option>Mingora</option>
                        <option>Hafizabad</option>
                        <option>Chiniot</option>
                    </select>
                </label>
                <br><br>

                <!-- Input Type Image -->

                <label for="img"><span style="color: blue; padding-left: 80px;">Image : </span></label>
                <input type="image" src="img_submit.gif" alt="Submit" width="48" height="48" id="img" name="img">
                <br><br>

                <!-- Input Type Time -->

                <label for="time"><span style="color: blue; padding-left: 80px;">Time : </span></label>
                <span style="padding-left: 60px;"><input type="time" id="time" name="time"></span>
                <br><br>

                <!-- Input Type Week -->

                <label for="week"><span style="color: blue; padding-left: 80px;">Week : </span></label>
                <span style="padding-left: 60px;"><input type="week" id="week" name="week"></span>
                <br><br>

                <!-- Input Type Month -->

                <label for="month"><span style="color: blue; padding-left: 80px;">Month : </span></label>
                <span style="padding-left: 53px;"><input type="month" id="month" name="month"></span>
                <br><br>


                <!-- Input Type Datetime-local -->

                <label for="dtime"><span style="color: blue; padding-left: 80px;">Datetime-local : </span></label>
                <input type="datetime-local" id="dtime" name="dtime">
                <br><br>

                <!-- Input Type Color -->

                <label for="color"><span style="color: blue; padding-left: 80px;">Select your favorite color :
                    </span></label>
                <input type="color" id="color" name="color">
                <br><br>

                <!-- Input Type Range -->

                <label for="vol"><span style="color: blue; padding-left: 80px;">Volume (between 0 and 50):
                    </span></label>
                <input type="range" id="vol" name="vol" min="0" max="50">
                <br><br>

                <!-- Input Type Tel -->

                <label for="phone"><span style="color: blue; padding-left: 80px;">Enter your phone number :
                    </span></label>
                <input type="tel" id="phone" name="phone" pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}">
                <br><br>

                <!-- Input Type Url -->

                <label for="homepage"><span style="color: blue; padding-left: 80px;">Add your homepage : </span></label>
                <span style="padding-left: 35px;"><input type="url" id="homepage" name="homepage"></span>
                <br><br>

                <!-- Input Type Search -->

                <label for="gsearch"><span style="color: blue; padding-left: 80px;">Search Google : </span></label>
                <span style="padding-left: 70px;"><input type="search" id="gsearch" name="gsearch"></span>
                <br><br>

                <!-- Input Type Submit -->

                <span style="padding-left: 285px;"><input type="submit" value="Submit"></span>
                <br><br>

                <!-- Input Type Reset -->

                <span style="padding-left: 290px;"><input type="reset" value="Reset"></span>
                <br><br>

                <!-- Input Type Button -->

                <span style="padding-left: 275px;"><input type="button" value="Bottom to Top"
                        onclick="window.location.href=`#top`;"></span>
                <br><br>

                <span style="padding-left: 260px;" id="bottom"><a href="index.html"
                        style="color: black; background-color: #f0f0f0; color: red; text-decoration: none; border: 1px solid rgb(105, 101, 101); border-radius: 3px; padding-left: 5px; padding-right: 5px; padding-bottom: 3px;">Go
                        to main page</a></span>

        </form>



    </div>
</body>

</html>
